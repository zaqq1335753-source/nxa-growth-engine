kind = "web"
previewPath = "/"
title = "NXA Growth Engine"
version = "1.0.0"
id = "artifacts/nxa-growth-engine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23046

[services.development]
run = "pnpm --filter @workspace/nxa-growth-engine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nxa-growth-engine", "run", "build" ]
publicDir = "artifacts/nxa-growth-engine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23046"
BASE_PATH = "/"
